name: Deploy Astro site to Pages

on:
  # Запускати при кожному push у main
  push:
    branches: [main]
  # Дозволяє запустити вручну з вкладки Actions (кнопка "Run workflow")
  workflow_dispatch:

# Права, потрібні для публікації на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Дозволяє лише одному деплою працювати одночасно;
# новий push скасовує деплой, що вже триває, але не перериває той, що завершується
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build, and upload your site
        uses: withastro/action@v3
        # За замовчуванням action шукає проєкт у корені репозиторію.
        # Якщо Astro-проєкт лежить не в корені (наприклад, у підпапці),
        # розкоментуйте і вкажіть шлях:
        # with:
        #   path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
